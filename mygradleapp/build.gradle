plugins {
    id 'java'
    id 'application'
}

repositories {
    mavenCentral()   // ✅ replace jcenter
}

dependencies {
    implementation 'org.seleniumhq.selenium:selenium-java:4.29.0'
    testImplementation 'junit:junit:4.13.2'
}

// ✅ FIX: correct main class
application {
    mainClass = 'com.example.App'
}
